version: "3"

dotenv: ['.env']

tasks:
  venv:
    desc: Create Python virtual environment
    cmds:
      - python3 -m venv .venv
      - .venv/bin/pip install --upgrade pip
    status:
      - test -d .venv

  deps:
    desc: Install project dependencies in the virtual environment
    cmds:
      - .venv/bin/pip install -e .
    deps:
      - venv

  default:
    desc: Start everything — Docker, connector, simulator, and sink
    cmds:
      - task: up

  docker-up:
    desc: Build and start all Docker services
    cmds:
      - docker compose up -d --build

  docker-down:
    desc: Stop all Docker services
    cmds:
      - docker compose down

  docker-down-v:
    desc: Stop all Docker services and remove volumes
    cmds:
      - docker compose down -v

  docker-reset:
    desc: Stop, wipe volumes, then rebuild and start
    cmds:
      - docker compose down -v
      - docker compose up -d --build

  up:
    desc: Full startup — Docker services, connector registration, simulator and sink
    cmds:
      - docker compose up -d --build
      - |
        echo "Waiting for Kafka Connect..."
        until curl -s -o /dev/null -w "%{http_code}" http://localhost:8083/connectors | grep -q "200"; do
          printf '.'
          sleep 2
        done
        echo " OK"
      - bash scripts/register-postgres-connector.sh
      - task: deps
      - |
        echo "Starting sink and simulator..."
        .venv/bin/python src/sink/consumer.py &
        .venv/bin/python src/simulator/simulate.py &
        wait

  db-revision:
    desc: Autogenerate an Alembic migration by comparing source DB to target
    cmds:
      - .venv/bin/alembic revision --autogenerate -m "schema sync"
    deps:
      - deps

  db-upgrade:
    desc: Apply pending Alembic migrations to the target database
    cmds:
      - .venv/bin/alembic upgrade head
    deps:
      - deps

  db-migrate:
    desc: Detect schema changes, generate migration, and apply to target
    cmds:
      - .venv/bin/alembic revision --autogenerate -m "schema sync"
      - .venv/bin/alembic upgrade head
    deps:
      - deps

  simulator:
    desc: Run the data simulator locally (requires docker services up)
    cmds:
      - .venv/bin/python src/simulator/simulate.py
    deps:
      - deps

  sink:
    desc: Run the CDC sink consumer locally (requires docker services up)
    cmds:
      - .venv/bin/python src/sink/consumer.py
    deps:
      - deps

  azurite:
    desc: List CDC blobs stored in Azurite
    cmds:
      - .venv/bin/python src/list_azurite.py
    deps:
      - deps

  restore:
    desc: Apply migrations, then replay Azurite CDC events into target database
    cmds:
      - task: db-upgrade
      - .venv/bin/python src/restore.py
    deps:
      - deps

  diff:
    desc: Compare source and target databases
    cmds:
      - .venv/bin/python src/diff.py
    deps:
      - deps

  verify:
    desc: Full verification — migrate, restore, then diff
    cmds:
      - task: db-migrate
      - task: restore
      - task: diff
